<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Comments Section</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body { font-family: 'Noto Kufi Arabic', sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f1f5f9; }
/* THE EXACT CSS FROM LIVE SITE */
  .comments-section {
    margin-top: 60px; padding: 30px;
    background: white; border-radius: 14px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 4px 20px rgba(30,58,138,0.06);
  }
  .comments-title {
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 22px; font-weight: 800; color: #1e3a8a;
    margin-bottom: 14px;
    border-bottom: 3px solid #dbeafe; padding-bottom: 14px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .comment-form {
    background: #f8faff; border-radius: 10px; padding: 24px;
    margin-bottom: 28px; border: 1px solid #dbeafe;
  }
  .form-row { display: flex; gap: 16px; margin-bottom: 16px; }
  .form-group { flex: 1; }
  .form-group label { font-family: 'Noto Kufi Arabic', sans-serif; font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 6px; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 10px 14px;
    border: 1px solid #d1d5db; border-radius: 8px;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 14px; color: #374151; background: white;
    direction: rtl; box-sizing: border-box;
  }
  .form-group textarea { resize: vertical; min-height: 110px; }
  .form-actions { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .rating-group { display: flex; align-items: center; gap: 10px; }
  .stars { display: flex; gap: 4px; direction: ltr; }
  .star { font-size: 24px; color: #d1d5db; cursor: pointer; }
  .submit-btn { font-family: 'Noto Kufi Arabic', sans-serif; font-size: 14px; font-weight: 700; background: #1e3a8a; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div class="comments-section">
  <h2 class="comments-title">
    <span>💬</span> شاركنا رأيك
    <span style="font-size:13px;color:#6b7280;font-weight:400;">Share Your Thoughts</span>
  </h2>
  <div style="font-size:14px;color:#6b7280;margin-bottom:24px;">هل لديك تعليق أو سؤال أو ملاحظة حول هذا الفصل؟ نرحب بمشاركتك وآرائك</div>
  <form class="comment-form">
    <div class="form-row">
      <div class="form-group">
        <label>الاسم <span style="font-weight:400;color:#9ca3af;font-size:11px;">(اختياري)</span></label>
        <input type="text" placeholder="اكتب اسمك هنا..." />
      </div>
      <div class="form-group">
        <label>التخصص <span style="font-weight:400;color:#9ca3af;font-size:11px;">(اختياري)</span></label>
        <input type="text" placeholder="طبيب، ممرض، طالب..." />
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label>تعليقك <span style="color:#ef4444;">*</span></label>
      <textarea rows="5" placeholder="اكتب تعليقك أو سؤالك هنا..."></textarea>
    </div>
    <div class="form-row form-actions">
      <div class="rating-group">
        <label>تقييم الفصل:</label>
        <div class="stars">
          <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
        </div>
      </div>
      <button type="submit" class="submit-btn">إرسال التعليق ←</button>
    </div>
  </form>
</div>
</body>
</html>
